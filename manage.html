<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // GitHub Configuration
        const GITHUB_REPO_OWNER = 'yorldbol';
        const GITHUB_REPO_NAME = 'yorldbol.github.io';
        
        // Volunteer tokens with GitHub PAT (Personal Access Tokens)
        // In production, store these securely server-side
        const VALID_CREDENTIALS = {
            'volunteer1': { password: 'pass123', githubToken: '' },
            'volunteer2': { password: 'pass456', githubToken: '' },
            'admin': { password: 'admin123', githubToken: '' },
            'Arthur Cheng': { password: 'Arthurc801108', githubToken: '' },
            'parttest': { password: 'parttest123456', githubToken: '' }
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [token, setToken] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [libraries, setLibraries] = useState([]);
            const [loading, setLoading] = useState(false);
            const [filter, setFilter] = useState('all');
            const [currentUser, setCurrentUser] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [tempToken, setTempToken] = useState('');
            const [tokenTimer, setTokenTimer] = useState(0);
            const [tokenTimerInterval, setTokenTimerInterval] = useState(null);

            useEffect(() => {
                // Check if already logged in
                const savedToken = localStorage.getItem('volunteer_token');
                const savedUser = localStorage.getItem('volunteer_user');
                if (savedToken && savedUser) {
                    setToken(savedToken);
                    setCurrentUser(savedUser);
                    setIsAuthenticated(true);
                }

                // Check for active GitHub token timer
                const savedGithubToken = sessionStorage.getItem('temp_github_token');
                const savedTimerEnd = sessionStorage.getItem('token_timer_end');
                if (savedGithubToken && savedTimerEnd) {
                    const remaining = Math.max(0, Math.floor((parseInt(savedTimerEnd) - Date.now()) / 1000));
                    if (remaining > 0) {
                        setTempToken(savedGithubToken);
                        setTokenTimer(remaining);
                        startTokenTimer(remaining);
                    } else {
                        sessionStorage.removeItem('temp_github_token');
                        sessionStorage.removeItem('token_timer_end');
                    }
                }
            }, []);

            useEffect(() => {
                if (isAuthenticated) {
                    fetchLibraries();
                    // Refresh every 300 seconds (5 minutes)
                    const interval = setInterval(fetchLibraries, 300000);
                    return () => clearInterval(interval);
                }
            }, [isAuthenticated]);

            const fetchLibraries = async () => {
                try {
                    setLoading(true);
                    
                    // Try to fetch from GitHub API
                    const response = await fetch('https://api.github.com/repos/yorldbol/yorldbol.github.io/contents/usrsr');
                    
                    if (!response.ok) {
                        throw new Error('API request failed');
                    }
                    
                    const usrsrFiles = await response.json();
                    
                    const response2 = await fetch('https://api.github.com/repos/yorldbol/yorldbol.github.io/contents/opensrc');
                    const opensrcFiles = await response2.json();
                    
                    const allFiles = [...(Array.isArray(opensrcFiles) ? opensrcFiles : []), ...(Array.isArray(usrsrFiles) ? usrsrFiles : [])];
                    const ybuiltinFiles = allFiles.filter(f => f.name && f.name.endsWith('.ybuiltin'));
                    
                    if (ybuiltinFiles.length > 0) {
                        const libraryData = ybuiltinFiles.map(file => ({
                            name: file.name.replace('.ybuiltin', ''),
                            type: file.path.startsWith('opensrc') ? 'official' : 'community',
                            path: file.path,
                            url: file.html_url,
                            downloadUrl: file.download_url
                        }));
                        
                        setLibraries(libraryData);
                    } else {
                        // Fallback to static data
                        setLibraries(getStaticLibraries());
                    }
                    
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching libraries:', error);
                    // Fallback to static data on error
                    setLibraries(getStaticLibraries());
                    setLoading(false);
                }
            };

            const getStaticLibraries = () => {
                return [
                    { name: 'core', type: 'official', path: 'opensrc/core.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/core.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/core.ybuiltin' },
                    { name: 'image', type: 'official', path: 'opensrc/image.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/image.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/image.ybuiltin' },
                    { name: 'data', type: 'official', path: 'opensrc/data.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/data.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/data.ybuiltin' },
                    { name: 'ai', type: 'official', path: 'opensrc/ai.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/ai.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/ai.ybuiltin' },
                    { name: 'network', type: 'official', path: 'opensrc/network.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/network.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/network.ybuiltin' },
                    { name: 'crypto', type: 'official', path: 'opensrc/crypto.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/crypto.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/crypto.ybuiltin' },
                    { name: 'file', type: 'official', path: 'opensrc/file.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/file.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/file.ybuiltin' },
                    { name: 'json', type: 'official', path: 'opensrc/json.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/json.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/json.ybuiltin' },
                    { name: 'xml', type: 'official', path: 'opensrc/xml.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/xml.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/xml.ybuiltin' },
                    { name: 'datetime', type: 'official', path: 'opensrc/datetime.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/datetime.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/datetime.ybuiltin' },
                    { name: 'math', type: 'official', path: 'opensrc/math.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/math.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/math.ybuiltin' },
                    { name: 'string', type: 'official', path: 'opensrc/string.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/string.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/string.ybuiltin' },
                    { name: 'array', type: 'official', path: 'opensrc/array.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/array.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/array.ybuiltin' },
                    { name: 'regex', type: 'official', path: 'opensrc/regex.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/regex.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/regex.ybuiltin' },

                    { name: 'video', type: 'official', path: 'opensrc/video.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/video.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/video.ybuiltin' },
                    { name: 'graphics', type: 'official', path: 'opensrc/graphics.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/graphics.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/graphics.ybuiltin' },
                    { name: 'testing', type: 'official', path: 'opensrc/testing.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/testing.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/testing.ybuiltin' },
                    { name: 'logging', type: 'official', path: 'opensrc/logging.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/opensrc/logging.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/opensrc/logging.ybuiltin' },
                    { name: 'web', type: 'community', path: 'usrsr/web.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/usrsr/web.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/usrsr/web.ybuiltin' },
                    { name: 'database', type: 'community', path: 'usrsr/database.ybuiltin', url: 'https://github.com/yorldbol/yorldbol.github.io/blob/main/usrsr/database.ybuiltin', downloadUrl: 'https://raw.githubusercontent.com/yorldbol/yorldbol.github.io/main/usrsr/database.ybuiltin' }
                ];
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');

                const credential = VALID_CREDENTIALS[token];
                if (credential && credential.password === password) {
                    localStorage.setItem('volunteer_token', token);
                    localStorage.setItem('volunteer_user', token);
                    if (credential.githubToken) {
                        localStorage.setItem('github_token', credential.githubToken);
                    }
                    setCurrentUser(token);
                    setIsAuthenticated(true);
                } else {
                    setError('Invalid token or password');
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('volunteer_token');
                localStorage.removeItem('volunteer_user');
                localStorage.removeItem('github_token');
                sessionStorage.removeItem('temp_github_token');
                sessionStorage.removeItem('token_timer_end');
                if (tokenTimerInterval) {
                    clearInterval(tokenTimerInterval);
                }
                setIsAuthenticated(false);
                setToken('');
                setPassword('');
                setCurrentUser('');
                setTempToken('');
                setTokenTimer(0);
            };

            const startTokenTimer = (seconds) => {
                if (tokenTimerInterval) {
                    clearInterval(tokenTimerInterval);
                }

                const interval = setInterval(() => {
                    setTokenTimer(prev => {
                        const newTime = prev - 1;
                        if (newTime <= 0) {
                            clearInterval(interval);
                            sessionStorage.removeItem('temp_github_token');
                            sessionStorage.removeItem('token_timer_end');
                            setTempToken('');
                            alert('⏰ GitHub token expired. Please add it again to perform management actions.');
                            return 0;
                        }
                        return newTime;
                    });
                }, 1000);

                setTokenTimerInterval(interval);
            };

            const handleSaveToken = () => {
                if (!tempToken.trim()) {
                    alert('Please enter a GitHub token');
                    return;
                }

                const timerEnd = Date.now() + 30000; // 30 seconds from now
                sessionStorage.setItem('temp_github_token', tempToken);
                sessionStorage.setItem('token_timer_end', timerEnd.toString());
                setTokenTimer(30);
                startTokenTimer(30);
                setShowSettings(false);
                alert('✅ GitHub token saved! You have 30 seconds to perform management actions.');
            };

            const handleClearToken = () => {
                sessionStorage.removeItem('temp_github_token');
                sessionStorage.removeItem('token_timer_end');
                if (tokenTimerInterval) {
                    clearInterval(tokenTimerInterval);
                }
                setTempToken('');
                setTokenTimer(0);
                setShowSettings(false);
                alert('🗑️ GitHub token cleared.');
            };

            const handleAction = async (action, library) => {
                const confirmMessage = `Are you sure you want to ${action} "${library.name}"?`;
                
                if (action === 'delete' || action === 'disable' || action === 'shutdown') {
                    if (!confirm(confirmMessage)) return;
                }

                // Get GitHub token from session storage (temporary token)
                const githubToken = sessionStorage.getItem('temp_github_token');

                try {
                    switch(action) {
                        case 'open':
                            window.open(library.url, '_blank');
                            break;
                        
                        case 'share':
                            const shareUrl = `https://yorldbol.github.io/${library.path}`;
                            await navigator.clipboard.writeText(shareUrl);
                            alert('✅ Library URL copied to clipboard!');
                            break;
                        
                        case 'delete':
                            if (!githubToken) {
                                alert('⚠️ GitHub token required. Please go to Settings and add your token.');
                                setShowSettings(true);
                                return;
                            }
                            
                            // Real GitHub API call to delete file
                            const deleteResponse = await fetch(
                                `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/${library.path}`,
                                {
                                    method: 'DELETE',
                                    headers: {
                                        'Authorization': `token ${githubToken}`,
                                        'Content-Type': 'application/json',
                                    },
                                    body: JSON.stringify({
                                        message: `Delete library: ${library.name}`,
                                        sha: await getFileSha(library.path, githubToken)
                                    })
                                }
                            );
                            
                            if (deleteResponse.ok) {
                                alert(`✅ Library "${library.name}" deleted successfully!`);
                                fetchLibraries();
                            } else {
                                const error = await deleteResponse.json();
                                alert(`❌ Failed to delete: ${error.message}`);
                            }
                            break;
                        
                        case 'disable':
                            // Create a .disabled marker file
                            if (!githubToken) {
                                alert('⚠️ GitHub token required. Please go to Settings and add your token.');
                                setShowSettings(true);
                                return;
                            }
                            
                            const disableResponse = await fetch(
                                `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/${library.path}.disabled`,
                                {
                                    method: 'PUT',
                                    headers: {
                                        'Authorization': `token ${githubToken}`,
                                        'Content-Type': 'application/json',
                                    },
                                    body: JSON.stringify({
                                        message: `Disable library: ${library.name}`,
                                        content: btoa(`Disabled by ${currentUser} at ${new Date().toISOString()}`)
                                    })
                                }
                            );
                            
                            if (disableResponse.ok) {
                                alert(`⏸️ Library "${library.name}" disabled successfully!`);
                            } else {
                                alert(`❌ Failed to disable library`);
                            }
                            break;
                        
                        case 'enable':
                            // Remove .disabled marker file
                            if (!githubToken) {
                                alert('⚠️ GitHub token required. Please go to Settings and add your token.');
                                setShowSettings(true);
                                return;
                            }
                            
                            const sha = await getFileSha(`${library.path}.disabled`, githubToken);
                            if (!sha) {
                                alert('ℹ️ Library is not disabled');
                                return;
                            }
                            
                            const enableResponse = await fetch(
                                `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/${library.path}.disabled`,
                                {
                                    method: 'DELETE',
                                    headers: {
                                        'Authorization': `token ${githubToken}`,
                                        'Content-Type': 'application/json',
                                    },
                                    body: JSON.stringify({
                                        message: `Enable library: ${library.name}`,
                                        sha: sha
                                    })
                                }
                            );
                            
                            if (enableResponse.ok) {
                                alert(`✅ Library "${library.name}" enabled successfully!`);
                            } else {
                                alert(`❌ Failed to enable library`);
                            }
                            break;
                        
                        case 'shutdown':
                            alert(`🛑 Shutdown request for "${library.name}" submitted. This requires manual intervention.`);
                            break;
                        
                        default:
                            break;
                    }
                } catch (error) {
                    console.error('Action error:', error);
                    alert(`❌ Error: ${error.message}`);
                }
            };

            // Helper function to get file SHA (required for GitHub API updates/deletes)
            const getFileSha = async (path, token) => {
                try {
                    const response = await fetch(
                        `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/${path}`,
                        {
                            headers: token ? {
                                'Authorization': `token ${token}`
                            } : {}
                        }
                    );
                    
                    if (response.ok) {
                        const data = await response.json();
                        return data.sha;
                    }
                    return null;
                } catch (error) {
                    console.error('Error getting file SHA:', error);
                    return null;
                }
            };

            const filtered = libraries.filter(lib => {
                if (filter === 'all') return true;
                return lib.type === filter;
            });

            const stats = {
                total: libraries.length,
                official: libraries.filter(l => l.type === 'official').length,
                community: libraries.filter(l => l.type === 'community').length
            };

            if (!isAuthenticated) {
                return (
                    <div className="login-container">
                        <div className="login-card">
                            <div className="login-header">
                                <span className="material-icons-outlined login-icon">admin_panel_settings</span>
                                <div className="login-title">Yorl-DBOL Management</div>
                                <div className="login-subtitle">Volunteer Portal</div>
                            </div>
                            
                            {error && (
                                <div className="error-message">
                                    <span className="material-icons-outlined">error</span>
                                    {error}
                                </div>
                            )}

                            <form onSubmit={handleLogin}>
                                <div className="form-group">
                                    <label className="form-label">Volunteer Token</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={token}
                                        onChange={(e) => setToken(e.target.value)}
                                        placeholder="Enter your volunteer token"
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Password</label>
                                    <input
                                        type="password"
                                        className="form-input"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Enter your password"
                                        required
                                    />
                                </div>
                                <button type="submit" className="login-button">
                                    Sign In
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <>
                    <div className="app-bar">
                        <div className="app-bar-content">
                            <div className="app-bar-left">
                                <span className="material-icons-outlined logo-icon">admin_panel_settings</span>
                                <div>
                                    <div className="logo">Yorl-DBOL Management</div>
                                    <div className="subtitle">Volunteer Portal</div>
                                </div>
                            </div>
                            <div className="user-info">
                                {tokenTimer > 0 && (
                                    <span className="user-badge" style={{background: '#e6f4ea', color: '#1e8e3e'}}>
                                        <span className="material-icons-outlined" style={{fontSize: 16, verticalAlign: 'middle'}}>timer</span>
                                        {' '}{tokenTimer}s
                                    </span>
                                )}
                                <span className="user-badge">
                                    <span className="material-icons-outlined" style={{fontSize: 16, verticalAlign: 'middle'}}>person</span>
                                    {' '}{currentUser}
                                </span>
                                <button className="settings-button" onClick={() => setShowSettings(true)}>
                                    <span className="material-icons-outlined">settings</span>
                                    Settings
                                </button>
                                <button className="logout-button" onClick={handleLogout}>
                                    <span className="material-icons-outlined" style={{fontSize: 16, verticalAlign: 'middle'}}>logout</span>
                                    {' '}Logout
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="container">
                        <div className="stats-grid">
                            <div className="stat-card">
                                <div className="stat-number">{stats.total}</div>
                                <div className="stat-label">Total Libraries</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-number">{stats.official}</div>
                                <div className="stat-label">Official</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-number">{stats.community}</div>
                                <div className="stat-label">Community</div>
                            </div>
                        </div>

                        <div className="section-header">
                            <div className="section-title">Manage Libraries</div>
                            <div className="filter-chips">
                                <div 
                                    className={`chip ${filter === 'all' ? 'active' : ''}`}
                                    onClick={() => setFilter('all')}
                                >
                                    All
                                </div>
                                <div 
                                    className={`chip ${filter === 'official' ? 'active' : ''}`}
                                    onClick={() => setFilter('official')}
                                >
                                    Official
                                </div>
                                <div 
                                    className={`chip ${filter === 'community' ? 'active' : ''}`}
                                    onClick={() => setFilter('community')}
                                >
                                    Community
                                </div>
                            </div>
                        </div>

                        {loading ? (
                            <div className="loading-spinner">
                                <span className="material-icons-outlined" style={{fontSize: 48}}>hourglass_empty</span>
                                <div style={{marginTop: 16}}>Loading libraries...</div>
                            </div>
                        ) : filtered.length === 0 ? (
                            <div className="no-results">
                                <span className="material-icons-outlined" style={{fontSize: 48}}>inbox</span>
                                <div style={{marginTop: 16}}>No libraries found</div>
                            </div>
                        ) : (
                            <div className="libraries-grid">
                                {filtered.map(lib => (
                                    <div key={lib.name} className="library-card">
                                        <div className="library-header">
                                            <div className="library-name">{lib.name}</div>
                                            <div className={`badge badge-${lib.type}`}>
                                                {lib.type}
                                            </div>
                                        </div>
                                        <div className="library-description">
                                            Path: {lib.path}
                                        </div>
                                        <div className="library-actions">
                                            <button 
                                                className="action-button primary"
                                                onClick={() => handleAction('open', lib)}
                                            >
                                                <span className="material-icons-outlined">open_in_new</span>
                                                Open
                                            </button>
                                            <button 
                                                className="action-button"
                                                onClick={() => handleAction('share', lib)}
                                            >
                                                <span className="material-icons-outlined">share</span>
                                                Share
                                            </button>
                                            <button 
                                                className="action-button"
                                                onClick={() => handleAction('enable', lib)}
                                            >
                                                <span className="material-icons-outlined">check_circle</span>
                                                Enable
                                            </button>
                                            <button 
                                                className="action-button"
                                                onClick={() => handleAction('disable', lib)}
                                            >
                                                <span className="material-icons-outlined">pause_circle</span>
                                                Disable
                                            </button>
                                            <button 
                                                className="action-button danger"
                                                onClick={() => handleAction('shutdown', lib)}
                                            >
                                                <span className="material-icons-outlined">block</span>
                                                Shutdown
                                            </button>
                                            <button 
                                                className="action-button danger"
                                                onClick={() => handleAction('delete', lib)}
                                            >
                                                <span className="material-icons-outlined">delete</span>
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {showSettings && (
                        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <div className="modal-title">
                                        <span className="material-icons-outlined" style={{fontSize: 24, verticalAlign: 'middle', marginRight: 8}}>settings</span>
                                        GitHub Token Settings
                                    </div>
                                    <button className="close-button" onClick={() => setShowSettings(false)}>
                                        <span className="material-icons-outlined">close</span>
                                    </button>
                                </div>

                                {tokenTimer > 0 ? (
                                    <div className="token-status active">
                                        <span className="material-icons-outlined" style={{fontSize: 32, color: '#1e8e3e'}}>check_circle</span>
                                        <div style={{flex: 1}}>
                                            <div style={{fontWeight: 500, color: '#1e8e3e', marginBottom: 4}}>Token Active</div>
                                            <div style={{fontSize: 13, color: '#5f6368'}}>You can perform management actions</div>
                                        </div>
                                        <div className="token-timer active">{tokenTimer}s</div>
                                    </div>
                                ) : (
                                    <div className="token-status expired">
                                        <span className="material-icons-outlined" style={{fontSize: 32, color: '#c5221f'}}>cancel</span>
                                        <div style={{flex: 1}}>
                                            <div style={{fontWeight: 500, color: '#c5221f', marginBottom: 4}}>No Active Token</div>
                                            <div style={{fontSize: 13, color: '#5f6368'}}>Add a token to manage libraries</div>
                                        </div>
                                    </div>
                                )}

                                <div className="info-box">
                                    <div style={{fontWeight: 500, marginBottom: 8, color: '#202124'}}>
                                        <span className="material-icons-outlined" style={{fontSize: 16, verticalAlign: 'middle'}}>info</span>
                                        {' '}How it works:
                                    </div>
                                    • Your GitHub token is stored temporarily for 30 seconds<br/>
                                    • During this time, you can delete, enable, or disable libraries<br/>
                                    • After 30 seconds, the token is automatically deleted<br/>
                                    • Your token is never sent to any server, only stored in your browser
                                </div>

                                <div className="token-input-group">
                                    <label style={{display: 'block', fontSize: 14, fontWeight: 500, marginBottom: 8, color: '#202124'}}>
                                        GitHub Personal Access Token
                                    </label>
                                    <input
                                        type="password"
                                        className="token-input"
                                        placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                                        value={tempToken}
                                        onChange={(e) => setTempToken(e.target.value)}
                                    />
                                    <div style={{fontSize: 12, color: '#5f6368', marginTop: 6}}>
                                        Create a token at: <a href="https://github.com/settings/tokens" target="_blank" style={{color: '#1a73e8'}}>github.com/settings/tokens</a>
                                    </div>
                                </div>

                                <div className="button-group">
                                    {tokenTimer > 0 && (
                                        <button className="button-danger-full" onClick={handleClearToken}>
                                            <span className="material-icons-outlined" style={{fontSize: 18, verticalAlign: 'middle'}}>delete</span>
                                            {' '}Clear Token
                                        </button>
                                    )}
                                    <button 
                                        className="button-primary-full" 
                                        onClick={handleSaveToken}
                                        disabled={!tempToken.trim()}
                                    >
                                        <span className="material-icons-outlined" style={{fontSize: 18, verticalAlign: 'middle'}}>save</span>
                                        {' '}Save Token (30s)
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
