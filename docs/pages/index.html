<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yorl-DBOL - Database of Official Libraries</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%);
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #ff00ff;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8b949e;
            font-size: 1.2em;
        }

        .search-box {
            margin: 30px 0;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 50px 15px 20px;
            font-size: 1.1em;
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 10px;
            color: #c9d1d9;
            transition: all 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 1.5em;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #00ffff;
            background: #1f2937;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #30363d;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #8b949e;
            margin-top: 5px;
        }

        .libraries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .library-card {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .library-card:hover {
            border-color: #ff00ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.2);
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .library-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ffff;
        }

        .library-badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .badge-official {
            background: #ff00ff;
            color: #fff;
        }

        .badge-community {
            background: #00ffff;
            color: #000;
        }

        .library-description {
            color: #8b949e;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .library-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #8b949e;
        }

        .library-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .keyword {
            padding: 3px 8px;
            background: #1f2937;
            border-radius: 5px;
            font-size: 0.8em;
            color: #00ff00;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
            font-size: 1.2em;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            border-top: 2px solid #30363d;
            margin-top: 60px;
            color: #8b949e;
        }

        .github-link {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
        }

        .github-link:hover {
            color: #ff00ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Yorl-DBOL</h1>
            <p class="subtitle">Database of Official Libraries</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search libraries by name, description, or keywords...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Libraries</button>
            <button class="filter-btn" data-filter="official">Official</button>
            <button class="filter-btn" data-filter="community">Community</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Libraries</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="officialCount">0</div>
                <div class="stat-label">Official</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="communityCount">0</div>
                <div class="stat-label">Community</div>
            </div>
        </div>

        <div class="libraries-grid" id="librariesGrid"></div>

        <div class="no-results" id="noResults" style="display: none;">
            No libraries found matching your search.
        </div>

        <footer>
            <p>
                <a href="https://github.com/Arthurc1Moude/yorl-dbol" class="github-link" target="_blank">
                    View on GitHub
                </a>
                |
                <a href="https://github.com/Arthurc1Moude/yorl" class="github-link" target="_blank">
                    Yorl Main Repository
                </a>
            </p>
            <p style="margin-top: 10px;">Built with ❤️ by the Yorl Community</p>
        </footer>
    </div>

    <script>
        const libraries = [
            // Official Libraries (opensrc/)
            { name: 'core', type: 'official', description: 'Core types and functions', keywords: ['core', 'basic', 'fundamental'], author: 'Yorl Official' },
            { name: 'image', type: 'official', description: 'Image processing and manipulation', keywords: ['image', 'graphics', 'photo'], author: 'Yorl Official' },
            { name: 'data', type: 'official', description: 'Data structures and operations', keywords: ['data', 'array', 'dict'], author: 'Yorl Official' },
            { name: 'ai', type: 'official', description: 'AI and machine learning', keywords: ['ai', 'ml', 'neural', 'model'], author: 'Yorl Official' },
            { name: 'network', type: 'official', description: 'TCP/UDP networking and protocols', keywords: ['network', 'tcp', 'udp', 'socket'], author: 'Yorl Official' },
            { name: 'crypto', type: 'official', description: 'Cryptography and security', keywords: ['crypto', 'encryption', 'hash', 'security'], author: 'Yorl Official' },
            { name: 'file', type: 'official', description: 'File I/O and compression', keywords: ['file', 'io', 'read', 'write', 'compress'], author: 'Yorl Official' },
            { name: 'json', type: 'official', description: 'JSON parsing and serialization', keywords: ['json', 'parse', 'serialize'], author: 'Yorl Official' },
            { name: 'xml', type: 'official', description: 'XML parsing and generation', keywords: ['xml', 'parse', 'dom', 'xpath'], author: 'Yorl Official' },
            { name: 'datetime', type: 'official', description: 'Date and time operations', keywords: ['date', 'time', 'datetime', 'timestamp'], author: 'Yorl Official' },
            { name: 'math', type: 'official', description: 'Advanced mathematical operations', keywords: ['math', 'algebra', 'geometry', 'calculus'], author: 'Yorl Official' },
            { name: 'string', type: 'official', description: 'String manipulation and utilities', keywords: ['string', 'text', 'manipulation'], author: 'Yorl Official' },
            { name: 'array', type: 'official', description: 'Array operations and utilities', keywords: ['array', 'list', 'collection'], author: 'Yorl Official' },
            { name: 'regex', type: 'official', description: 'Regular expression operations', keywords: ['regex', 'pattern', 'match'], author: 'Yorl Official' },
            { name: 'audio', type: 'official', description: 'Audio processing and manipulation', keywords: ['audio', 'sound', 'music', 'wav'], author: 'Yorl Official' },
            { name: 'video', type: 'official', description: 'Video processing and manipulation', keywords: ['video', 'movie', 'mp4', 'codec'], author: 'Yorl Official' },
            { name: 'graphics', type: 'official', description: '2D/3D graphics and rendering', keywords: ['graphics', 'render', '2d', '3d'], author: 'Yorl Official' },
            { name: 'testing', type: 'official', description: 'Testing and assertion utilities', keywords: ['test', 'assert', 'mock', 'unit'], author: 'Yorl Official' },
            { name: 'logging', type: 'official', description: 'Logging and monitoring utilities', keywords: ['log', 'logger', 'debug', 'monitor'], author: 'Yorl Official' },
            
            // Community Libraries (usrsr/)
            { name: 'web', type: 'community', description: 'HTTP/WebSocket/REST APIs', keywords: ['web', 'http', 'websocket', 'rest', 'api'], author: 'Yorl Community' },
            { name: 'database', type: 'community', description: 'SQL/NoSQL database operations', keywords: ['database', 'sql', 'nosql', 'query'], author: 'Yorl Community' }
        ];

        let currentFilter = 'all';
        let currentSearch = '';

        function renderLibraries() {
            const grid = document.getElementById('librariesGrid');
            const noResults = document.getElementById('noResults');
            
            let filtered = libraries.filter(lib => {
                const matchesFilter = currentFilter === 'all' || lib.type === currentFilter;
                const matchesSearch = currentSearch === '' || 
                    lib.name.toLowerCase().includes(currentSearch) ||
                    lib.description.toLowerCase().includes(currentSearch) ||
                    lib.keywords.some(k => k.toLowerCase().includes(currentSearch));
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            noResults.style.display = 'none';

            grid.innerHTML = filtered.map(lib => `
                <div class="library-card" onclick="window.open('https://github.com/Arthurc1Moude/yorl-dbol/blob/main/${lib.type === 'official' ? 'opensrc' : 'usrsr'}/${lib.name}.ybuiltin', '_blank')">
                    <div class="library-header">
                        <div class="library-name">${lib.name}</div>
                        <div class="library-badge badge-${lib.type}">${lib.type.toUpperCase()}</div>
                    </div>
                    <div class="library-description">${lib.description}</div>
                    <div class="library-meta">
                        <span>👤 ${lib.author}</span>
                        <span>📦 v1.0.0</span>
                    </div>
                    <div class="library-keywords">
                        ${lib.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const official = libraries.filter(l => l.type === 'official').length;
            const community = libraries.filter(l => l.type === 'community').length;
            
            document.getElementById('totalCount').textContent = libraries.length;
            document.getElementById('officialCount').textContent = official;
            document.getElementById('communityCount').textContent = community;
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderLibraries();
        });

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderLibraries();
            });
        });

        // Initial render
        updateStats();
        renderLibraries();
    </script>
</body>
</html>
